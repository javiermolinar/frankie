services:
  frankie:
    image: javimolinar/frankie:latest
    container_name: frankie
    restart: unless-stopped
    ports:
      - "3593:3593"
    environment:
      PORT: "3593"
      CONFIG_FILE: "/config/config.json"
      # Frankie can reach Prowlarr using the service name below.
      PROWLARR_URL: "http://prowlarr:9696"
      # Optional if exposed behind a reverse proxy / domain:
      # PUBLIC_URL: "https://your-domain.example"
    volumes:
      - frankie_config:/config
    depends_on:
      - prowlarr

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
    volumes:
      - prowlarr_config:/config

volumes:
  frankie_config:
  prowlarr_config:
